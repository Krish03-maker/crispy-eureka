<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Generate custom QR codes with color selection, logo upload, and instant preview. Free, fast, and beautifully designed." />
  <title>QR Craft — Custom QR Code Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated background blobs -->
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="2.5"/>
          <rect x="24" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="2.5"/>
          <rect x="2" y="24" width="14" height="14" rx="2" stroke="currentColor" stroke-width="2.5"/>
          <rect x="6" y="6" width="6" height="6" rx="1" fill="currentColor"/>
          <rect x="28" y="6" width="6" height="6" rx="1" fill="currentColor"/>
          <rect x="6" y="28" width="6" height="6" rx="1" fill="currentColor"/>
          <rect x="24" y="26" width="4" height="4" rx="1" fill="currentColor"/>
          <rect x="30" y="26" width="8" height="3" rx="1" fill="currentColor"/>
          <rect x="24" y="32" width="3" height="6" rx="1" fill="currentColor"/>
          <rect x="30" y="34" width="8" height="4" rx="1" fill="currentColor"/>
        </svg>
        <h1>QR Craft</h1>
      </div>
      <p class="subtitle">Create stunning, customized QR codes in seconds</p>
    </header>

    <!-- Main content grid -->
    <div class="content-grid">
      <!-- Left panel — Controls -->
      <section class="panel controls-panel" aria-label="QR Code Settings">
        <!-- URL Input -->
        <div class="input-group" id="url-section">
          <label for="url-input" class="input-label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            Enter URL
          </label>
          <div class="url-input-wrapper">
            <input
              type="url"
              id="url-input"
              placeholder="https://example.com"
              autocomplete="url"
              spellcheck="false"
            />
            <div class="input-glow"></div>
          </div>
        </div>

        <!-- Divider -->
        <div class="divider">
          <span>Customize</span>
        </div>

        <!-- Color Options -->
        <div class="options-row">
          <div class="color-group" id="fg-color-section">
            <label for="fg-color" class="input-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="13.5" cy="6.5" r="2.5"/>
                <circle cx="19" cy="13.5" r="2.5"/>
                <circle cx="13.5" cy="20.5" r="2.5"/>
                <circle cx="5" cy="13.5" r="2.5"/>
              </svg>
              Dot Color
            </label>
            <div class="color-picker-wrapper">
              <input type="color" id="fg-color" value="#ffffff" />
              <span class="color-hex" id="fg-hex">#ffffff</span>
            </div>
          </div>

          <div class="color-group" id="bg-color-section">
            <label for="bg-color" class="input-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
              </svg>
              Background
            </label>
            <div class="color-picker-wrapper">
              <input type="color" id="bg-color" value="#0a0a1a" />
              <span class="color-hex" id="bg-hex">#0a0a1a</span>
            </div>
          </div>
        </div>

        <!-- Dot Style -->
        <div class="dot-style-group" id="dot-style-section">
          <label class="input-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            Dot Style
          </label>
          <div class="dot-style-options">
            <button class="dot-btn active" data-style="rounded" id="dot-rounded" title="Rounded">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="6" fill="currentColor"/></svg>
            </button>
            <button class="dot-btn" data-style="dots" id="dot-dots" title="Dots">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="currentColor"/></svg>
            </button>
            <button class="dot-btn" data-style="classy" id="dot-classy" title="Classy">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" fill="currentColor"/></svg>
            </button>
            <button class="dot-btn" data-style="square" id="dot-square" title="Square">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" fill="currentColor"/></svg>
            </button>
          </div>
        </div>

        <!-- Logo Upload -->
        <div class="logo-upload-group" id="logo-section">
          <label class="input-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            Center Logo
          </label>
          <div class="upload-area" id="upload-area">
            <input type="file" id="logo-upload" accept="image/*" hidden />
            <div class="upload-placeholder" id="upload-placeholder">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <span>Click or drag to upload</span>
              <span class="upload-hint">PNG, JPG, SVG — max 2MB</span>
            </div>
            <div class="upload-preview" id="upload-preview" hidden>
              <img id="logo-preview-img" alt="Uploaded logo preview" />
              <button class="remove-logo-btn" id="remove-logo" title="Remove logo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Generate Button -->
        <button class="generate-btn" id="generate-btn">
          <span class="btn-text">Generate QR Code</span>
          <span class="btn-loader" id="btn-loader" hidden>
            <svg class="spinner" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4" stroke-linecap="round"/>
            </svg>
          </span>
          <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
      </section>

      <!-- Right panel — Preview -->
      <section class="panel preview-panel" aria-label="QR Code Preview">
        <div class="preview-header">
          <h2>Preview</h2>
          <div class="preview-actions" id="preview-actions" hidden>
            <button class="action-btn" id="download-png" title="Download PNG">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              PNG
            </button>
            <button class="action-btn" id="download-svg" title="Download SVG">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              SVG
            </button>
          </div>
        </div>
        <div class="preview-container" id="preview-container">
          <div class="preview-empty" id="preview-empty">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="3" height="3" rx="0.5"/>
              <rect x="18" y="14" width="3" height="3" rx="0.5"/>
              <rect x="14" y="18" width="3" height="3" rx="0.5"/>
              <rect x="18" y="18" width="3" height="3" rx="0.5"/>
            </svg>
            <p>Your QR code will appear here</p>
          </div>
          <div class="qr-output" id="qr-output" hidden></div>
        </div>
      </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>Built with care · QR Craft</p>
    </footer>
  </main>

  <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
  <script src="script.js"></script>
</body>
</html>
